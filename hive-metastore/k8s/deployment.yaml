# Hive Metastore standalone 배포 (Hive 3.1.3)
# - Hive 4.x는 Iceberg 미지원 (get_table API 삭제 이슈)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-metastore-config
  namespace: metastore
data:
  metastore-site.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
        <!-- PostgreSQL 연결 -->
        <property>
            <name>javax.jdo.option.ConnectionURL</name>
            <value>jdbc:postgresql://postgres.airflow.svc.cluster.local:5432/metastore</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionDriverName</name>
            <value>org.postgresql.Driver</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionUserName</name>
            <value>airflow</value>
        </property>
        <property>
            <name>javax.jdo.option.ConnectionPassword</name>
            <value>airflow</value>
        </property>
        <!-- Metastore Thrift 서버 -->
        <property>
            <name>hive.metastore.uris</name>
            <value>thrift://0.0.0.0:9083</value>
        </property>
        <!-- Warehouse 경로 (MinIO) -->
        <property>
            <name>hive.metastore.warehouse.dir</name>
            <value>s3a://iceberg-warehouse/</value>
        </property>
        <!-- S3(MinIO) 연결 -->
        <property>
            <name>fs.s3a.endpoint</name>
            <value>http://minio.storage.svc.cluster.local:9000</value>
        </property>
        <property>
            <name>fs.s3a.access.key</name>
            <value>minioadmin</value>
        </property>
        <property>
            <name>fs.s3a.secret.key</name>
            <value>minioadmin</value>
        </property>
        <property>
            <name>fs.s3a.path.style.access</name>
            <value>true</value>
        </property>
        <property>
            <name>fs.s3a.impl</name>
            <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
        </property>
    </configuration>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: metastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: metastore
          image: hive-metastore:local
          imagePullPolicy: Never
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: postgres
            - name: SKIP_SCHEMA_INIT
              value: "false"
          ports:
            - containerPort: 9083
              name: thrift
          volumeMounts:
            - name: metastore-config
              mountPath: /opt/hive/conf/metastore-site.xml
              subPath: metastore-site.xml
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: metastore-config
          configMap:
            name: hive-metastore-config
