# MinIO Service
# - ClusterIP: 클러스터 내부 접근 (Spark, Airflow 등)
# - NodePort: 로컬에서 Console UI 접근용
---
# 클러스터 내부 접근용
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: storage
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# 로컬 Console UI 접근용 (localhost:9001 → NodePort 30901)
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: storage
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
