# MinIO 배포 (S3 호환 오브젝트 스토리지)
# - API: 9000 (S3 API)
# - Console: 9001 (Web UI)
# - 초기 버킷 자동 생성: iceberg-warehouse, spark-logs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: minio-data
          emptyDir: {}
---
# 초기 버킷 생성 Job (MinIO Client 사용)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: storage
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/ready; do
                echo "MinIO 대기 중..."
                sleep 2
              done
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 minioadmin minioadmin
              mc mb --ignore-existing local/iceberg-warehouse
              mc mb --ignore-existing local/spark-logs
              echo "버킷 생성 완료"
              mc ls local/
  backoffLimit: 3
